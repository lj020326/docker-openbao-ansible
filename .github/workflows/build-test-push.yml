name: Build, Test, and Push Docker image

on:
  # Allows manual triggering
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Schedule run (once daily)
  schedule:
    ## Daily Docker Image Rebuild (10:29am daily)
    - cron: '29 10 * * *'

env:
  DOCKER_IMAGE: ${{ github.repository_owner }}/openbao-ansible

jobs:
  # 1. Parse the YAML configuration file
  setup:
    name: Initialize Matrix Configuration
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-matrix.outputs.versions }}
      platforms: ${{ steps.set-matrix.outputs.platforms }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Load Build Parameters
        id: set-matrix
        run: |
          # Read arrays from YAML file and convert them to compact JSON arrays
          VERSIONS_JSON=$(yq -o=json -I=0 '.versions' .github/build-config.yml)
          PLATFORMS_JSON=$(yq -o=json -I=0 '.platforms' .github/build-config.yml)
          
          echo "versions=${VERSIONS_JSON}" >> $GITHUB_OUTPUT
          echo "platforms=${PLATFORMS_JSON}" >> $GITHUB_OUTPUT

  # 2. Build and test each platform in parallel
  build-and-test:
    name: Build & Test (${{ matrix.version }} / ${{ matrix.buildPlatforms }})
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.setup.outputs.versions) }}
        buildPlatforms: ${{ fromJson(needs.setup.outputs.platforms) }}

    # Add necessary permissions for the workflow token
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Install the latest Python 3 version - required for "Run Test Suite"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: If the same workflow is already running from a previous commit, wait for it to finish
        uses: ahmadnassri/action-workflow-queue@v1

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Set up QEMU for multi-architecture emulation (Required for linux/arm64 on ubuntu-latest)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get current date
        id: date
        run: echo "::set-output name=date::$(date +'%Y%m%d')"

      # Set a unique build ID for the current matrix version
      # Sanitizing platform string (slashes to hyphens) for clean artifact and tag naming variants if needed
      - name: Set unique build ID
        id: set-build-id
        run: |
          PLATFORM_CLEAN=$(echo "${{ matrix.buildPlatforms }}" | sed 's/\//-/g')
          echo "BUILD_ID=${{ matrix.version }}-build-${{ github.run_number }}-${PLATFORM_CLEAN}" >> $GITHUB_ENV

      - name: Build image for version ${{ matrix.version }} (${{ matrix.buildPlatforms }})
        id: build-test-image
        uses: docker/build-push-action@v7
        with:
          context: ./image
          file: ./image/Dockerfile
          platforms: ${{ matrix.buildPlatforms }}
          build-args: |
            OPENBAO_VERSION=${{ matrix.version }}
            BUILD_ID=${{ env.BUILD_ID }}
            BUILD_DATE=${{ steps.date.outputs.date }}
          push: false
          # load: true exports the single-platform image to the runner's local docker daemon so your test script can run it
          load: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.BUILD_ID }}

      - name: Run Test Suite
        run: |
          # The test script handles all Docker Compose commands.
          # It cleans up before and after the test run.
          bash test/test-openbao-container.sh --junit --skip-build --test-results-dir '.test-results' \
            --image-name ${{ env.DOCKER_IMAGE }} --build-id ${{ env.BUILD_ID }}

      - name: Show contents of .test-results/ directory
        # This step runs even if the previous step failed, so we can always see the report.
        if: always()
        run: |
          pwd
          find .test-results/ -type f

      - name: Generate and display job summary
        # This step runs even if the previous step failed, so we can always see the report.
        if: always()
        run: |
          echo "### Test Results for OpenBao ${{ matrix.version }} (${{ matrix.buildPlatforms }})" >> $GITHUB_STEP_SUMMARY
          echo "| Test Case | Failed |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          # Check if the file exists before attempting to process it
          if [ -f .test-results/test-report.json ]; then
            jq -r '.[] | "| \( .test_name ) | **\( .failed )** |"' .test-results/test-report.json >> $GITHUB_STEP_SUMMARY
          else
            echo "No test report file found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Archive Test Results
        uses: actions/upload-artifact@v4
        if: always()
        ## ref: https://stackoverflow.com/questions/71766432/github-workflow-does-not-upload-artifact
        env:
          ACTIONS_STEP_DEBUG: true
        with:
          name: test-results-${{ env.BUILD_ID }}
          path: "${{ github.workspace }}/.test-results/"

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: .test-results/*.xml

  # 3. Push multi-arch image (only runs if ALL tests passed)
  push-multi-arch:
    name: Push Multi-arch (${{ matrix.version }})
    needs: [setup, build-and-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        version: ${{ fromJson(needs.setup.outputs.versions) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get current date
        id: date
        run: echo "::set-output name=date::$(date +'%Y%m%d')"

      # Set a unique build ID for the current matrix version
      - name: Set unique build ID
        id: set-build-id
        run: |
          echo "BUILD_ID=${{ matrix.version }}-build-${{ github.run_number }}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Push multi-arch image for version ${{ matrix.version }}
        uses: docker/build-push-action@v7
        with:
          context: ./image
          file: ./image/Dockerfile
          # You can either join the platform array here or keep it hardcoded as it represents the multi-arch target
          platforms: linux/amd64,linux/arm64
          build-args: |
            OPENBAO_VERSION=${{ matrix.version }}
            BUILD_ID=${{ env.BUILD_ID }}
            BUILD_DATE=${{ steps.date.outputs.date }}
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.BUILD_ID }}
            ${{ env.DOCKER_IMAGE }}:${{ matrix.version }}
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:${{ steps.date.outputs.date }}
