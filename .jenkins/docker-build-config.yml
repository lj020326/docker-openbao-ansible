---
pipeline:
  alwaysEmailList: ljohnson@dettonville.org
  runInParallel: true
  maxRandomDelaySeconds: 60

  buildDir: "image"
  buildArgs:
    IMAGE_REGISTRY: media.johnson.int:5000

  buildImageList:
    - buildImageLabel: "openbao-ansible"
      buildArgs:
        OPENBAO_VERSION: "2.3.2"
      buildTags:
        - "2.3.2"
    - buildImageLabel: "openbao-ansible"
      buildArgs:
        OPENBAO_VERSION: "2.2"
      buildTags:
        - "2.2"
    - buildImageLabel: "openbao-ansible"
      buildArgs:
        OPENBAO_VERSION: "latest"
      buildTags:
        - latest
